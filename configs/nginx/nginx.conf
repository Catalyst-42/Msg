location /msg/ {
  alias /var/www/tauceti/msg/;
  
  # Must be defined in global nginx.conf:
	# limit_req_zone $binary_remote_addr zone=limreq:5m rate=5r/s;

  limit_req zone=limreq burst=4 nodelay;
	limit_req_status 429;

  # Front access to files
  location ~ /msg/files/ {
    deny all;
    return 403;
  }

  # Main page
  location = /msg/ {
    index index.php;
    try_files $uri $uri/ /msg/index.php?$args;
  }

  # PHP files
  location ~ \.php$ {
    include snippets/fastcgi-php.conf;
    fastcgi_pass unix:/run/php/php8.3-fpm.sock;

    fastcgi_param SCRIPT_FILENAME $request_filename;
    include fastcgi_params;
  }
}
