[msg-protection]
bantime = 4h
findtime = 1h
maxretry = 400

enabled = true
filter = msg-protection
logpath = /var/log/nginx/access.log
action = nginx-banlist

[msg-protection-slow]
bantime = 48h
findtime = 4h
maxretry = 960

enabled = true
filter = msg-protection
logpath = /var/log/nginx/access.log
action = nginx-banlist
